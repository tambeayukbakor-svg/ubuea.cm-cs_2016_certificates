<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTech Computer Engineering || University of Buea</title>
</head>
<body>

<h2>University of Buea</h2>
<h3>Certificate Verification Portal</h3>

<div id="result">Checking certificate...</div>

<script>

const resultDiv = document.getElementById("result");

const params = new URLSearchParams(window.location.search);
let certID = params.get("id");

if (!certID) {
    resultDiv.innerHTML = "No certificate ID provided.";
} else {

    certID = certID.trim().replace(/-/g,"_");

    fetch("certificates.json")
    .then(response => response.json())
    .then(data => {

        const cert = data[certID];

        if (cert) {

            resultDiv.innerHTML =
            "<h3 style='color:green'>VALID CERTIFICATE</h3>" +
            "<b>Name:</b> " + cert.name + "<br>" +
            "<b>Date of Birth:</b> " + cert.d_o_b + "<br>" +
            "<b>Place of Birth:</b> " + cert.p_o_b + "<br><br>" +

            "<b>University:</b> " + cert.school + "<br>" +
            "<b>Faculty:</b> " + cert.faculty + "<br>" +
            "<b>Department:</b> " + cert.department + "<br>" +

            "<b>Degree:</b> " + cert.degree + "<br>" +
            "<b>Classification:</b> " + cert.grade + "<br>" +

            "<b>Graduation Year:</b> " + cert.graduation_year + "<br>" +
            "<b>Date Awarded:</b> " + cert.effective_date_of_award;

        } else {

            resultDiv.innerHTML =
            "<h3 style='color:red'>INVALID CERTIFICATE</h3>";

        }

    })
    .catch(err => {

        console.error(err);
        resultDiv.innerHTML = "Error loading certificate database.";

    });

}

</script>

</body>
</html>
