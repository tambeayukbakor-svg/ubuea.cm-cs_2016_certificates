<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTech Computer Engineering || University of Buea</title>
</head>
<body>

<h2>University of Buea</h2>
<h3>Certificate Verification Portal</h3>

<div id="result">Checking certificate...</div>

<script>

const params = new URLSearchParams(window.location.search);
const certID = params.get("id");

if(!certID){
document.getElementById("result").innerHTML = "No certificate ID provided.";
return;
}

fetch("certificates.json")
.then(response => response.json())
.then(data => {

const cleanID = certID.trim();
if(data[cleanID]){

document.getElementById("result").innerHTML =
"<h3 style='color:green'>VALID CERTIFICATE</h3>" +
"<b>Name:</b> " + data[certID].name + "<br>" +
"<b>Date of Birth:</b> " + data[certID].d_o_b + "<br>" +
"<b>Place of Birth:</b> " + data[certID].p_o_b + "<br><br>" +

"<b>University:</b> " + data[certID].school + "<br>" +
"<b>Faculty:</b> " + data[certID].faculty + "<br>" +
"<b>Department:</b> " + data[certID].department + "<br>" +

"<b>Degree:</b> " + data[certID].degree + "<br>" +
"<b>Classification:</b> " + data[certID].grade + "<br>" +

"<b>Graduation Year:</b> " + data[certID].graduation_year + "<br>" +
"<b>Date Awarded:</b> " + data[certID].effective_date_of_award;

}else{

document.getElementById("result").innerHTML =
"<h3 style='color:red'>INVALID CERTIFICATE</h3>";

}

})
.catch(error => {
document.getElementById("result").innerHTML = "Error loading certificate data.";
console.error(error);
});

</script>

</body>
</html>
